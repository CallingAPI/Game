<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman Game</title>

 
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

 
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">

        <div class="card shadow-sm">
          <div class="card-body p-4 text-center">

            <!-- Title -->
            <h1 class="card-title mb-3 fw-bold text-primary">Hangman Game</h1>
            <p class="text-muted mb-4">Guess the hidden word, a letter at a time!</p>

            <!-- Hint -->
            <p class="mb-3">
              <span class="fw-semibold">Hint:</span>
              <span id="hint" class="text-secondary">—</span>
            </p>

            <!-- Word display (blanks) -->
            <div id="wordDisplay" class="word-display mb-4">_ _ _ _</div>

            <!-- Guess input -->
            <div class="row justify-content-center mb-3">
              <div class="col-sm-8">
                <div class="input-group">
                  <input
                    type="text"
                    id="letterInput"
                    class="form-control form-control-lg text-center"
                    maxlength="1"
                    placeholder="Enter a letter"
                    autocomplete="off"
                  />
                  <button id="guessBtn" class="btn btn-primary btn-lg">
                    Guess
                  </button>
                </div>
              </div>
            </div>

          
            <p class="mb-2">
              Tries remaining:
              <span id="triesLeft" class="badge bg-danger fs-6">6</span>
            </p>
            <p class="mb-3">
              Guessed letters:
              <span id="guessedLetters" class="text-muted">none</span>
            </p>
            <div id="message" class="fw-bold fs-5 mb-3"></div>
            <button id="resetBtn" class="btn btn-outline-secondary">
              Reset Game
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
